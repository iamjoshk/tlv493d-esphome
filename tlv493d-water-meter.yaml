---
# Drop-in override for tronikos/esphome-magnetometer-water-gas-meter
# that replaces the QMC5883L sensor with the TLV493D-A1B6.
#
# Usage:
#   packages:
#     meter:
#       url: https://github.com/tronikos/esphome-magnetometer-water-gas-meter
#       ref: main
#       file: esphome-water-meter.yaml
#     tlv493d:
#       url: https://github.com/iamjoshk/tlv493d-esphome
#       ref: main
#       file: tlv493d-water-meter.yaml
#       refresh: 0s

substitutions:
  qmc5883l_update_interval: '50ms'
  i2c_address: '0x5E'

external_components:
  - source: github://iamjoshk/tlv493d-esphome
    components: [tlv493d]
    refresh: 0s

logger:
  logs:
    tlv493d: INFO

i2c:
  - id: !extend ${prefix_id}i2c_bus
    frequency: 100kHz
    sda_pullup_enabled: true
    scl_pullup_enabled: true

sensor:
  - id: !extend ${prefix_id}qmc5883l_id
    platform: tlv493d
    smoothing_factor: 20%
    # Expose TLV493D temperature under the tronikos temperature sensor ID so the
    # existing "Temperature" HA entity and temperature_offset calibration number work.
    temperature:
      id: ${prefix_id}qmc5883l_temperature
